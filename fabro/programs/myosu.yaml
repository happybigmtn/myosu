version: 1
program: myosu
target_repo: ../..
state_path: ../../.raspberry/myosu-state.json
max_parallel: 2
children:
- program: myosu-bootstrap
  manifest: myosu-bootstrap.yaml
  depends_on: []
- program: myosu-chain-core
  manifest: myosu-chain-core.yaml
  depends_on:
  - ../../outputs/chain/runtime/review.md
  - ../../outputs/chain/pallet/review.md
- program: myosu-services
  manifest: myosu-services.yaml
  depends_on:
  - ../../outputs/chain/runtime/review.md
  - ../../outputs/chain/pallet/review.md
- program: myosu-product
  manifest: myosu-product.yaml
  depends_on:
  - ../../outputs/tui/shell/review.md
- program: myosu-platform
  manifest: myosu-platform.yaml
  depends_on:
  - ../../outputs/games/traits/review.md
- program: myosu-recurring
  manifest: myosu-recurring.yaml
  depends_on: []
