version: 1
program: myosu
target_repo: ../..
state_path: ../../.raspberry/myosu-state.json
max_parallel: 2
units:
  - id: bootstrap
    title: Bootstrap Frontier
    output_root: ../../.raspberry/portfolio/bootstrap
    lanes:
      - id: program
        kind: orchestration
        title: Bootstrap Program
        run_config: ../programs/myosu-bootstrap.yaml
        program_manifest: ../programs/myosu-bootstrap.yaml
        managed_milestone: coordinated

  - id: chain-core
    title: Chain Core Frontier
    output_root: ../../.raspberry/portfolio/chain-core
    lanes:
      - id: program
        kind: orchestration
        title: Chain Core Program
        run_config: ../programs/myosu-chain-core.yaml
        program_manifest: ../programs/myosu-chain-core.yaml
        managed_milestone: coordinated
        depends_on:
          - unit: bootstrap
            lane: program
            milestone: coordinated

  - id: games-traits-implementation
    title: Traits Implementation Frontier
    output_root: ../../.raspberry/portfolio/games-traits-implementation
    lanes:
      - id: program
        kind: orchestration
        title: Traits Implementation Program
        run_config: ../programs/myosu-games-traits-implementation.yaml
        program_manifest: ../programs/myosu-games-traits-implementation.yaml
        managed_milestone: coordinated
        depends_on:
          - unit: bootstrap
            lane: program
            milestone: coordinated

  - id: services
    title: Services Frontier
    output_root: ../../.raspberry/portfolio/services
    lanes:
      - id: program
        kind: orchestration
        title: Services Program
        run_config: ../programs/myosu-services.yaml
        program_manifest: ../programs/myosu-services.yaml
        managed_milestone: coordinated
        depends_on:
          - unit: chain-core
            lane: program
            milestone: coordinated

  - id: product
    title: Product Frontier
    output_root: ../../.raspberry/portfolio/product
    lanes:
      - id: program
        kind: orchestration
        title: Product Program
        run_config: ../programs/myosu-product.yaml
        program_manifest: ../programs/myosu-product.yaml
        managed_milestone: coordinated
        depends_on:
          - unit: bootstrap
            lane: program
            milestone: coordinated

  - id: platform
    title: Platform Frontier
    output_root: ../../.raspberry/portfolio/platform
    lanes:
      - id: program
        kind: orchestration
        title: Platform Program
        run_config: ../programs/myosu-platform.yaml
        program_manifest: ../programs/myosu-platform.yaml
        managed_milestone: coordinated
        depends_on:
          - unit: bootstrap
            lane: program
            milestone: coordinated

  - id: recurring
    title: Recurring Oversight Frontier
    output_root: ../../.raspberry/portfolio/recurring
    lanes:
      - id: program
        kind: orchestration
        title: Recurring Program
        run_config: ../programs/myosu-recurring.yaml
        program_manifest: ../programs/myosu-recurring.yaml
        managed_milestone: coordinated
        depends_on:
          - unit: bootstrap
            lane: program
            milestone: coordinated
          - unit: chain-core
            lane: program
            milestone: coordinated
