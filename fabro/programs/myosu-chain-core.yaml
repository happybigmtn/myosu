version: 1
program: myosu-chain-core
target_repo: ../..
state_path: ../../.raspberry/myosu-chain-core-state.json
max_parallel: 1
preconditions:
- artifact: ../../outputs/chain/runtime/review.md
- artifact: ../../outputs/chain/pallet/review.md
units:
- id: chain-runtime
  lane_key: chain:runtime
  title: Chain runtime restart
  output_root: ../../outputs/chain/runtime
  run_config: ../run-configs/bootstrap/chain-runtime-restart.toml
  artifacts:
  - id: review
    path: review.md
  success_when:
  - artifact: review
- id: chain-pallet
  lane_key: chain:pallet
  title: Chain pallet restart
  output_root: ../../outputs/chain/pallet
  run_config: ../run-configs/bootstrap/chain-pallet-restart.toml
  artifacts:
  - id: review
    path: review.md
  success_when:
  - artifact: review
