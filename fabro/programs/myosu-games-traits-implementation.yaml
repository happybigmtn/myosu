version: 1
program: myosu-games-traits-implementation
target_repo: ../..
state_path: ../../.raspberry/myosu-games-traits-implementation-state.json
max_parallel: 1
units:
  - id: games
    title: Game Traits Delivery
    output_root: ../../outputs/games/traits
    artifacts:
      - id: spec
        path: spec.md
      - id: review
        path: review.md
      - id: implementation
        path: implementation.md
      - id: verification
        path: verification.md
    milestones:
      - id: reviewed
        requires: [spec, review]
      - id: implemented
        requires: [spec, review, implementation]
      - id: verified
        requires: [spec, review, implementation, verification]
    lanes:
      - id: traits-implement
        kind: platform
        title: Traits Implementation Lane
        run_config: ../run-configs/implement/game-traits.toml
        managed_milestone: verified
        proof_profile: games_traits_implement
        depends_on:
          - unit: games
            milestone: reviewed
        checks:
          - label: traits_code_present
            kind: precondition
            type: file_exists
            path: ../../crates/myosu-games/src/traits.rs
          - label: traits_implementation_proof
            kind: proof
            type: command_succeeds
            command: ./fabro/checks/games-traits-implement.sh
        produces: [implementation, verification]
