version: 1
program: myosu-services
target_repo: ../..
state_path: ../../.raspberry/myosu-services-state.json
max_parallel: 1
preconditions:
- artifact: ../../outputs/chain/runtime/review.md
- artifact: ../../outputs/chain/pallet/review.md
units:
- id: miner-service
  lane_key: miner:service
  title: Miner service
  output_root: ../../outputs/miner/service
  run_config: ../run-configs/services/miner-service.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
- id: validator-oracle
  lane_key: validator:oracle
  title: Validator oracle
  output_root: ../../outputs/validator/oracle
  run_config: ../run-configs/services/validator-oracle.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
