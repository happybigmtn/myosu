version: 1
program: myosu-bootstrap
target_repo: ../..
state_path: ../../.raspberry/myosu-bootstrap-state.json
max_parallel: 1
units:
- id: games-traits
  lane_key: games:traits
  title: Bootstrap games:traits
  output_root: ../../outputs/games/traits
  run_config: ../run-configs/bootstrap/game-traits.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
- id: tui-shell
  lane_key: tui:shell
  title: Bootstrap tui:shell
  output_root: ../../outputs/tui/shell
  run_config: ../run-configs/bootstrap/tui-shell.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
- id: chain-runtime
  lane_key: chain:runtime
  title: Bootstrap chain:runtime
  output_root: ../../outputs/chain/runtime
  run_config: ../run-configs/bootstrap/chain-runtime-restart.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
- id: chain-pallet
  lane_key: chain:pallet
  title: Bootstrap chain:pallet
  output_root: ../../outputs/chain/pallet
  run_config: ../run-configs/bootstrap/chain-pallet-restart.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
