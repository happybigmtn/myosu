version: 1
program: myosu-product
target_repo: ../..
state_path: ../../.raspberry/myosu-product-state.json
max_parallel: 1
preconditions:
- artifact: ../../outputs/tui/shell/review.md
units:
- id: play-tui
  lane_key: play:tui
  title: Playable TUI
  output_root: ../../outputs/play/tui
  run_config: ../run-configs/review-promote/play-tui.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
- id: agent-experience
  lane_key: agent:experience
  title: Agent experience
  output_root: ../../outputs/agent/experience
  run_config: ../run-configs/review-promote/agent-experience.toml
  artifacts:
  - id: spec
    path: spec.md
  - id: review
    path: review.md
  success_when:
  - artifact: spec
  - artifact: review
