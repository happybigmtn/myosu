version: 1
program: myosu-recurring
target_repo: ../..
state_path: ../../.raspberry/myosu-recurring-state.json
max_parallel: 2
units:
  - id: strategy
    title: Strategy Planning
    output_root: ../../outputs/strategy/planning
    artifacts:
      - id: spec
        path: spec.md
      - id: review
        path: review.md
    milestones:
      - id: reviewed
        requires: [spec, review]
    lanes:
      - id: planning
        kind: recurring
        title: Strategy Planning Lane
        run_config: ../run-configs/maintenance/strategy-planning.toml
        managed_milestone: reviewed
        proof_profile: strategy_planning_bootstrap
        checks:
          - label: doctrine_index_present
            kind: precondition
            type: file_exists
            path: ../../specs/031626-00-master-index.md
        produces: [spec, review]

  - id: security
    title: Security Audit
    output_root: ../../outputs/security/audit
    artifacts:
      - id: spec
        path: spec.md
      - id: review
        path: review.md
    milestones:
      - id: reviewed
        requires: [spec, review]
    lanes:
      - id: audit
        kind: recurring
        title: Security Audit Lane
        run_config: ../run-configs/maintenance/security-audit.toml
        managed_milestone: reviewed
        proof_profile: security_audit_bootstrap
        checks:
          - label: chain_core_runtime_review_ready
            kind: precondition
            type: file_exists
            path: ../../outputs/chain/runtime/review.md
        produces: [spec, review]

  - id: operations
    title: Operations Scorecard
    output_root: ../../outputs/operations/scorecard
    artifacts:
      - id: spec
        path: spec.md
      - id: review
        path: review.md
    milestones:
      - id: reviewed
        requires: [spec, review]
    lanes:
      - id: scorecard
        kind: recurring
        title: Operations Scorecard Lane
        run_config: ../run-configs/maintenance/operations-scorecard.toml
        managed_milestone: reviewed
        proof_profile: operations_scorecard_bootstrap
        checks:
          - label: bootstrap_program_present
            kind: precondition
            type: file_exists
            path: ../../fabro/programs/myosu-bootstrap.yaml
        produces: [spec, review]

  - id: learning
    title: Learning Improvement
    output_root: ../../outputs/learning/improvement
    artifacts:
      - id: spec
        path: spec.md
      - id: review
        path: review.md
    milestones:
      - id: reviewed
        requires: [spec, review]
    lanes:
      - id: improvement
        kind: recurring
        title: Learning Improvement Lane
        run_config: ../run-configs/maintenance/learning-improvement.toml
        managed_milestone: reviewed
        proof_profile: learning_improvement_bootstrap
        checks:
          - label: workflow_library_plan_present
            kind: precondition
            type: file_exists
            path: ../../plans/031926-design-myosu-fabro-workflow-library.md
        produces: [spec, review]
