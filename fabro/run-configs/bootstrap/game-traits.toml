version = 1
graph = "../../workflows/bootstrap/game-traits.fabro"
goal = """
Bootstrap the Myosu `games:traits` lane for Fabro and Raspberry.

Scope:
- inspect `crates/myosu-games/Cargo.toml`
- inspect `crates/myosu-games/src/lib.rs`
- inspect `crates/myosu-games/src/traits.rs`
- inspect `crates/myosu-games/README.md`
- inspect the current tests and proof commands for `myosu-games`
- treat `myosu-games` as a trusted kept leaf crate
- call out portability gaps, especially absolute robopoker path dependencies
- do not implement new code in this bootstrap run; this lane is for contract and
  trust-shaping artifacts only

Required curated artifacts:
- `outputs/games/traits/spec.md`
- `outputs/games/traits/review.md`

The `spec.md` must:
- define the lane boundary and what `games:traits` owns
- list the currently trusted files and the current proof commands
- describe portability blockers and repo-shape blockers
- name the smallest approved implementation slices in order
- say what the implementation lane is allowed to change first

The `review.md` must:
- make the keep/reopen/reset judgment explicit
- say whether the implementation lane is unblocked after bootstrap completion
- list concrete risks that the implementation lane must preserve or reduce
- point to exact files and proof commands, not vague categories

The combined output should be strong enough that the implementation-shaped lane
can consume these artifacts without re-deriving the lane contract from scratch.
"""
directory = "../../.."

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[sandbox.env]
ANTHROPIC_BASE_URL = "https://api.minimax.io/anthropic"
ANTHROPIC_AUTH_TOKEN = "${env.MINIMAX_API_KEY}"
API_TIMEOUT_MS = "3000000"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
ANTHROPIC_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_SMALL_FAST_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_DEFAULT_SONNET_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_DEFAULT_OPUS_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "MiniMax-M2.7-highspeed"
