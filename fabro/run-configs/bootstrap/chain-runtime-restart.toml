version = 1
graph = "../../workflows/restart/chain-runtime.fabro"
goal = """
Bootstrap the Myosu `chain:runtime` restart lane for Fabro and Raspberry.

Scope:
- inspect `crates/myosu-chain/runtime/`, `crates/myosu-chain/node/`,
  `crates/myosu-chain/common/`, and the root workspace definition
- treat the current chain/runtime effort as a restart candidate, not a trusted
  implementation base
- define the smallest honest restart slice that would produce a real runtime
  crate and proofable build path

Required curated artifacts:
- `outputs/chain/runtime/spec.md`
- `outputs/chain/runtime/review.md`

The spec must define the restart boundary, required manifests, proof shape, and
next implementation slices. The review must justify the restart and list only
salvageable inputs.
"""
directory = "../../.."

[sandbox]
provider = "local"

[sandbox.local]
