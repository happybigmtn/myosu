version = 1
graph = "../../workflows/maintenance/operations-scorecard.fabro"
goal = """
Bootstrap the Myosu `operations:scorecard` recurring lane for Fabro and Raspberry.

Scope:
- inspect `ops/scorecard.md`
- inspect `ops/kpi_registry.yaml`
- inspect `ops/risk_register.md`
- inspect `fabro/programs/` and `outputs/`

Required curated artifacts:
- `outputs/operations/scorecard/spec.md`
- `outputs/operations/scorecard/review.md`

The `spec.md` must define:
- what the operations scorecard lane should read and summarize
- what durable outputs it should eventually refresh
- what healthy recurring operations behavior would look like

The `review.md` must:
- identify trustworthy operations surfaces that already exist
- identify stale or missing scorecard surfaces
- state the next honest recurring implementation slice
"""
directory = "../.."

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"
