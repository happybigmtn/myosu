version = 1
graph = "../../workflows/maintenance/strategy-planning.fabro"
goal = """
Bootstrap the Myosu `strategy:planning` recurring lane for Fabro and Raspberry.

Scope:
- inspect `OS.md`
- inspect `specs/`
- inspect `plans/`
- inspect `fabro/programs/`

Required curated artifacts:
- `outputs/strategy/planning/spec.md`
- `outputs/strategy/planning/review.md`

The `spec.md` must define:
- what strategy planning should read as doctrine
- what it should be allowed to propose or refresh later
- what healthy recurring planning would look like

The `review.md` must:
- identify which strategy surfaces are already trustworthy
- identify stale or missing planning surfaces
- state the next honest recurring implementation slice
"""
directory = "../../.."

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"
