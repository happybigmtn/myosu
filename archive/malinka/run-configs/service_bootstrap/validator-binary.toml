version = 1
graph = "../../workflows/service_bootstrap/validator-binary.fabro"
goal = """
Validator Binary Implementation

Bootstrap the first service slice and establish a deterministic health surface.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `genesis/plans/001-master-plan.md`
- `genesis/plans/002-fabro-cleanup-completion.md`

Current frontier tasks:
- Create `crates/myosu-validator/` crate scaffold
- Implement validator registration with chain
- Implement exploitability scoring using `myosu-games`
- Implement weight verification and submission
- Implement hotkey management
- Test end-to-end: validator registers → scores miners → submits weights

Required durable artifacts:
- `outputs/validator-binary/spec.md`
- `outputs/validator-binary/review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
