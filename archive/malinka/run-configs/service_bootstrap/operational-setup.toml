version = 1
graph = "../../workflows/service_bootstrap/operational-setup.fabro"
goal = """
Operational Setup

Bootstrap the first service slice and establish a deterministic health surface.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `genesis/plans/001-master-plan.md`
- `genesis/plans/002-fabro-cleanup-completion.md`

Current frontier tasks:
- Write devnet launch runbook
- Set up basic chain monitoring (block time, emission, neuron count)
- Write failure recovery runbook (common failure modes)
- Document environment variables needed

Required durable artifacts:
- `outputs/operational-setup/spec.md`
- `outputs/operational-setup/review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
