Implement bincode serialization roundtrip and TUI rendering for Liar's Dice game state

Owned surfaces:
- `crates/myosu-games-liars-dice/src/`

Proof commands:
- `cargo test -p myosu-games-liars-dice -- roundtrip`

Required durable artifacts:
- `spec.md`
