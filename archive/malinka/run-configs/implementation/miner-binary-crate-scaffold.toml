version = 1
graph = "../../workflows/implementation/miner-binary-crate-scaffold.fabro"
goal = """
Create crates/myosu-miner/ crate scaffold

Child work item of plan: Miner Binary Implementation

Objective:
Scaffold binary crate with clap CLI that parses subnet, hotkey, wallet, register, solve, submit flags

Owned surfaces:
- `crates/myosu-miner/Cargo.toml`
- `crates/myosu-miner/src/main.rs`
- `crates/myosu-miner/src/cli.rs`

Proof commands:
- `cargo build -p myosu-miner`
- `cargo run -p myosu-miner -- --help`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
