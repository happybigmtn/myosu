version = 1
graph = "../../workflows/implementation/chain-restart-wire-remaining-pallets.fabro"
goal = """
Wire remaining critical pallets

Child work item of plan: Chain Restart

Objective:
Wire admin-utils, commitments, registry, swap, and transaction-fee pallets into construct_runtime!

Owned surfaces:
- `crates/myosu-chain/runtime/src/lib.rs`

Proof commands:
- `cargo check -p myosu-chain-runtime`

Required durable artifacts:
- `spec.md`
