version = 1
graph = "../../workflows/implementation/tui-full-implementation-implement-poker-screens.fabro"
goal = """
Implement all poker screens

Child work item of plan: TUI Full Implementation

Objective:
Tab navigation between all five poker screens works without panics

Owned surfaces:
- `crates/myosu-tui/src/screens.rs`
- `crates/myosu-games-poker/src/renderer.rs`

Proof commands:
- `cargo build -p myosu-tui`
- `cargo test -p myosu-tui`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
