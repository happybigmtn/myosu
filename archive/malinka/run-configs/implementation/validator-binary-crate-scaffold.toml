version = 1
graph = "../../workflows/implementation/validator-binary-crate-scaffold.fabro"
goal = """
Create myosu-validator crate scaffold

Child work item of plan: Validator Binary Implementation

Objective:
Scaffold a CLI binary crate with --subnet, --hotkey, --register, --score, --submit flags

Owned surfaces:
- `crates/myosu-validator/Cargo.toml`
- `crates/myosu-validator/src/main.rs`

Proof commands:
- `cargo build -p myosu-validator`
- `cargo run -p myosu-validator -- --help`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
