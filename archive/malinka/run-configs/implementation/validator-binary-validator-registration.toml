version = 1
graph = "../../workflows/implementation/validator-binary-validator-registration.fabro"
goal = """
Implement validator registration with chain

Child work item of plan: Validator Binary Implementation

Objective:
Register the validator on a target subnet via subtensor RPC

Owned surfaces:
- `crates/myosu-validator/src/registration.rs`

Proof commands:
- `cargo build -p myosu-validator`
- `cargo run -p myosu-validator -- --subnet 1 --register`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
