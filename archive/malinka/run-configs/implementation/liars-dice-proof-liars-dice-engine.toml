version = 1
graph = "../../workflows/implementation/liars-dice-proof-liars-dice-engine.fabro"
goal = """
Implement Liar's Dice game engine

Child work item of plan: Liar's Dice Architecture Proof

Objective:
Implement CfrGame trait for Liar's Dice with exactly 147,420 terminal states using Copy workaround for variable-length bid history

Owned surfaces:
- `crates/myosu-games-liars-dice/`

Proof commands:
- `cargo test -p myosu-games-liars-dice -- terminal_state_count`

Required durable artifacts:
- `spec.md`
