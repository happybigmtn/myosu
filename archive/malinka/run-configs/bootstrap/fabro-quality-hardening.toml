version = 1
graph = "../../workflows/bootstrap/fabro-quality-hardening.fabro"
goal = """
Fabro Quality Hardening

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `genesis/plans/001-master-plan.md`
- `genesis/plans/002-fabro-cleanup-completion.md`

Current frontier tasks:
- Audit all Fabro proof commands for false-green patterns
- Replace `cargo test -p myosu-games` with explicit test names
- Add quality gate to all implementation-family programs
- Add smoke test to all generated programs
- Verify autodev no longer produces compile-only completions

Required durable artifacts:
- `outputs/fabro-quality-hardening/spec.md`
- `outputs/fabro-quality-hardening/review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
