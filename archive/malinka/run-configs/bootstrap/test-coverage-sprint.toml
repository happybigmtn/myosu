version = 1
graph = "../../workflows/bootstrap/test-coverage-sprint.fabro"
goal = """
Test Coverage Sprint

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `genesis/plans/001-master-plan.md`
- `genesis/plans/002-fabro-cleanup-completion.md`

Current frontier tasks:
- Add screen transition tests to `myosu-tui`
- Add shell state tests to `myosu-tui`
- Add event loop tests to `myosu-tui`
- Add property-based round-trip tests to `myosu-games`
- Integrate into Fabro quality gates (proof commands must run these tests)

Required durable artifacts:
- `outputs/test-coverage-sprint/spec.md`
- `outputs/test-coverage-sprint/review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
