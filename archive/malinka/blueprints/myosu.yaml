      - Add shell state tests to `myosu-tui`
      - Add event loop tests to `myosu-tui`
      - Add property-based round-trip tests to `myosu-games`
      - Integrate into Fabro quality gates (proof commands must run these tests)

      Artifacts to write:
      - `spec.md`
      - `review.md`
