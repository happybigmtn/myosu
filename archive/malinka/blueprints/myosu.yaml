      - Required tests: cargo test -p myosu-tui -- shell_state
      - Verification plan: cargo test -p myosu-tui -- shell_state runs at least 10 tests and all pass
      - Rollback condition: Shell state tests fail or coverage drops below 10 test cases

      Proof commands:
      - `cargo test -p myosu-tui -- shell_state`

      Artifacts to write:
      - `spec.md`
      - `review.md`
    verify_command: cargo test -p myosu-tui -- shell_state
    health_command: 'true'
