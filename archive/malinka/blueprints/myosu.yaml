      - Validator: `cargo run -p myosu-validator`
      - TUI: `cargo run -p myosu-play -- train`
      - RPC: `ws://localhost:9944`

      ---

      ## Plan of Work

      1. Verify each component works in isolation (P007, P008, P009, P011, P012 complete)
