version = 1
graph = "../../workflows/bootstrap/tui-full-implementation.fabro"
goal = """
TUI Full Implementation

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `genesis/plans/001-master-plan.md`
- `genesis/plans/002-fabro-cleanup-completion.md`

Current frontier tasks:
- Fix `myosu-play` binary so it actually enters the terminal loop (not compile-only)
- Wire poker renderer into TUI shell
- Implement all poker screens: title, new game, play, hand history, settings
- Implement pipe mode end-to-end for agent protocol
- Implement theme system with poker-specific colors
- Add comprehensive integration tests

Required durable artifacts:
- `outputs/tui-full-implementation/spec.md`
- `outputs/tui-full-implementation/review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
