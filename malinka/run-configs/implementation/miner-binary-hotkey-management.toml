version = 1
graph = "../../workflows/implementation/miner-binary-hotkey-management.fabro"
goal = """
Implement hotkey management

Child work item of plan: Miner Binary Implementation

Objective:
Load hotkey from file, use it to sign registration and weight submission transactions

Owned surfaces:
- `crates/myosu-miner/src/main.rs`

Proof commands:
- `cargo build -p myosu-miner`
- `cargo run -p myosu-miner -- --hotkey ./test-hotkey --help`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
