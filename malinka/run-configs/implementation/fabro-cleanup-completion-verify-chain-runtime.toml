version = 1
graph = "../../workflows/implementation/fabro-cleanup-completion-verify-chain-runtime.fabro"
goal = """
Verify chain:runtime bootstrap artifacts are current

Child work item of plan: Complete Fabro Control-Plane Bootstrap

Objective:
Confirm or regenerate spec.md and review.md to reflect current crates/myosu-chain/runtime/ state

Owned surfaces:
- `outputs/chain/runtime/spec.md`
- `outputs/chain/runtime/review.md`
- `fabro/run-configs/bootstrap/chain-runtime-restart.toml`

Proof commands:
- `test -f outputs/chain/runtime/spec.md && test -f outputs/chain/runtime/review.md`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
