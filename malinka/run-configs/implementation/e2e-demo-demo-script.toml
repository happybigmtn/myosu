version = 1
graph = "../../workflows/implementation/e2e-demo-demo-script.fabro"
goal = """
Write the demo script

Child work item of plan: End-to-End Demo

Objective:
Document the full narrative: start chain, register miner, solve, submit, validate, play

Owned surfaces:
- `demo/README.md`

Proof commands:
- `test -f demo/README.md`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
