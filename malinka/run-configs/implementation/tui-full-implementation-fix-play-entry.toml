version = 1
graph = "../../workflows/implementation/tui-full-implementation-fix-play-entry.fabro"
goal = """
Fix myosu-play binary entry point

Child work item of plan: TUI Full Implementation

Objective:
myosu-play train enters a blocking terminal loop instead of exiting immediately

Owned surfaces:
- `crates/myosu-play/src/main.rs`
- `crates/myosu-tui/src/events.rs`
- `crates/myosu-tui/src/shell.rs`

Proof commands:
- `cargo build -p myosu-play`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
