version = 1
graph = "../../workflows/implementation/test-coverage-sprint-games-roundtrip-tests.fabro"
goal = """
Add property-based round-trip tests to myosu-games

Child work item of plan: Test Coverage Sprint

Objective:
Add proptest-based tests verifying GameType::from_bytes(g.to_bytes()) == g for random configurations

Owned surfaces:
- `crates/myosu-games/Cargo.toml`
- `crates/myosu-games/src/tests/`
- `crates/myosu-games/src/traits.rs`

Proof commands:
- `cargo test -p myosu-games -- serialization_roundtrip`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
