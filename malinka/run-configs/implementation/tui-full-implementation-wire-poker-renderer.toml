version = 1
graph = "../../workflows/implementation/tui-full-implementation-wire-poker-renderer.fabro"
goal = """
Wire poker renderer into TUI shell

Child work item of plan: TUI Full Implementation

Objective:
State panel shows hole cards, board, pot, and positions via GameRenderer trait

Owned surfaces:
- `crates/myosu-games-poker/src/renderer.rs`
- `crates/myosu-tui/src/screens.rs`

Proof commands:
- `cargo build -p myosu-games-poker`
- `cargo test -p myosu-games-poker`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
