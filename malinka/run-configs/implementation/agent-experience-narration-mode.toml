version = 1
graph = "../../workflows/implementation/agent-experience-narration-mode.fabro"
goal = """
Implement rich narration mode

Child work item of plan: Agent Experience Implementation

Objective:
Add --narrate flag that renders game state as prose with board texture, session arc, and strategic context

Owned surfaces:
- `crates/myosu-tui/src/narration.rs`
- `crates/myosu-tui/src/pipe.rs`

Proof commands:
- `cargo test -p myosu-tui narration::tests::narrate_includes_board_texture`
- `cargo test -p myosu-tui narration::tests::narrate_includes_session_context`
- `cargo test -p myosu-tui narration::tests::terse_and_narrate_same_game_state`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
