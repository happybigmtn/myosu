version = 1
graph = "../../workflows/implementation/nlhe-game-engine-kuhn-cfrgame-impl.fabro"
goal = """
Implement CfrGame for Kuhn Poker

Child work item of plan: NLHE Game Engine Implementation

Objective:
CfrGame impl for 3-card Kuhn Poker passes exploitability test within 1e-6 of 1/72

Owned surfaces:
- `crates/myosu-games-poker/src/kuhn.rs`

Proof commands:
- `cargo test -p myosu-games-poker -- kuhn`

Required durable artifacts:
- `spec.md`
- `review.md`
