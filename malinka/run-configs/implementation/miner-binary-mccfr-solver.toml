version = 1
graph = "../../workflows/implementation/miner-binary-mccfr-solver.fabro"
goal = """
Implement MCCFR game-solver using myosu-games

Child work item of plan: Miner Binary Implementation

Objective:
Run MCCFR solving for the configured game via myosu-games and produce strategy checkpoints

Owned surfaces:
- `crates/myosu-miner/src/main.rs`

Proof commands:
- `cargo build -p myosu-miner`
- `cargo run -p myosu-miner -- --subnet 1 --solve --iterations 10000`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
