Owned surfaces:
- `crates/myosu-sdk/src/scaffold.rs`

Proof commands:
- `cargo build -p myosu-sdk`
- `myosu-sdk scaffold --game liars-dice --output /tmp/new-game`
- `cargo check --manifest-path /tmp/new-game/Cargo.toml`

Required durable artifacts:
- `spec.md`
- `review.md`
