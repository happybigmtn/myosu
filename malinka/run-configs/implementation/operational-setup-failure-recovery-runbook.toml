version = 1
graph = "../../workflows/implementation/operational-setup-failure-recovery-runbook.fabro"
goal = """
Write failure recovery runbook

Child work item of plan: Operational Setup

Objective:
Document at least 5 common failure modes with step-by-step recovery procedures

Owned surfaces:
- `ops/runbooks/failure-recovery.md`

Proof commands:
- `test -f ops/runbooks/failure-recovery.md`

Required durable artifacts:
- `spec.md`
- `review.md`
