version = 1
graph = "../../workflows/implementation/miner-binary-neuron-registration.fabro"
goal = """
Implement neuron registration with chain

Child work item of plan: Miner Binary Implementation

Objective:
Register the miner as a neuron on the target subnet via substrate RPC

Owned surfaces:
- `crates/myosu-miner/src/main.rs`

Proof commands:
- `cargo build -p myosu-miner`
- `cargo run -p myosu-miner -- --subnet 1 --register --rpc ws://localhost:9944`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
