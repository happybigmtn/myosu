version = 1
graph = "../../workflows/implementation/operational-setup-env-documentation.fabro"
goal = """
Document environment variables

Child work item of plan: Operational Setup

Objective:
Create .env.example with every required variable annotated with its purpose

Owned surfaces:
- `.env.example`

Proof commands:
- `test -f .env.example`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
