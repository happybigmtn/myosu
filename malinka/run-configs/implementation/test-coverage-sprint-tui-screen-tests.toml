version = 1
graph = "../../workflows/implementation/test-coverage-sprint-tui-screen-tests.fabro"
goal = """
Add screen transition tests to myosu-tui

Child work item of plan: Test Coverage Sprint

Objective:
Add tests verifying mode transitions (normal, pipe, command) in the screen manager

Owned surfaces:
- `crates/myosu-tui/src/tests/mod.rs`
- `crates/myosu-tui/src/tests/screen_tests.rs`
- `crates/myosu-tui/src/screens.rs`

Proof commands:
- `cargo test -p myosu-tui -- screen`

Required durable artifacts:
- `spec.md`
- `review.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
