version = 1
graph = "../../workflows/recurring_report/master.fabro"
goal = """
180-Day Myosu Turnaround Master Plan

Produce the recurring report artifact for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `genesis/plans/001-master-plan.md`
- `genesis/plans/002-fabro-cleanup-completion.md`

Required durable artifacts:
- `outputs/master/report.md`
"""
directory = "../../.."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[llm.fallbacks]
anthropic = ["openai", "gemini", "kimi", "minimax"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
FABRO_STRICT_PROVIDER = "1"
