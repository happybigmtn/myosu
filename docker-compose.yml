services:
  chain:
    build:
      context: .
      dockerfile: Dockerfile
      target: chain-runtime
    user: "0:0"
    entrypoint:
      - /usr/local/bin/chain-devnet-entrypoint.sh
    command:
      - --rpc-cors
      - all
    environment:
      MYOSU_NODE_AUTHORITY_SURI: //myosu//devnet//authority-1
      MYOSU_CHAIN_SPEC: devnet
      MYOSU_BASE_PATH: /var/lib/myosu/chain
      MYOSU_RPC_PORT: "9944"
      MYOSU_NODE_NAME: Container Devnet Authority
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS -H 'Content-Type: application/json'
          -d '{"jsonrpc":"2.0","id":1,"method":"system_health","params":[]}'
          http://127.0.0.1:9944 >/dev/null
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 10s
    ports:
      - "9944:9944"
    volumes:
      - chain-data:/var/lib/myosu/chain

  miner:
    build:
      context: .
      dockerfile: Dockerfile
      target: miner-runtime
    user: "0:0"
    depends_on:
      chain:
        condition: service_healthy
    environment:
      MYOSU_CHAIN_ENDPOINT: ws://chain:9944
      MYOSU_CHAIN_HTTP_ENDPOINT: http://chain:9944
      MYOSU_SUBNET: "7"
      MYOSU_MINER_KEY: //myosu//devnet//miner-1
      MYOSU_MINER_PORT: "8080"
      MYOSU_RPC_TIMEOUT_SECS: "240"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --noproxy '*' -fsS http://127.0.0.1:8080/health >/dev/null
      interval: 5s
      timeout: 5s
      retries: 72
      start_period: 180s
    ports:
      - "8080:8080"
    volumes:
      - operator-data:/var/lib/myosu

  validator:
    build:
      context: .
      dockerfile: Dockerfile
      target: validator-runtime
    user: "0:0"
    depends_on:
      chain:
        condition: service_healthy
      miner:
        condition: service_healthy
    environment:
      MYOSU_CHAIN_ENDPOINT: ws://chain:9944
      MYOSU_CHAIN_HTTP_ENDPOINT: http://chain:9944
      MYOSU_SUBNET: "7"
      MYOSU_OWNER_KEY: //myosu//devnet//subnet-owner
      MYOSU_VALIDATOR_KEY: //myosu//devnet//validator-1
      MYOSU_MINER_HOTKEY: //myosu//devnet//miner-1
      MYOSU_VALIDATOR_STAKE: "100000000000000"
      MYOSU_MINER_HTTP_ENDPOINT: http://miner:8080/health
      MYOSU_RPC_TIMEOUT_SECS: "240"
    volumes:
      - operator-data:/var/lib/myosu

volumes:
  chain-data:
  operator-data:
