name: CI

on:
  pull_request:
    branches:
      - trunk
      - main
  push:
    branches:
      - trunk
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-shape:
    name: Stage-0 Repo Shape
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Verify current stage-0 workspace and doctrine surface
        run: bash .github/scripts/check_stage0_repo_shape.sh

  robopoker-fork-coherence:
    name: Robopoker Fork Coherence
    runs-on: ubuntu-latest
    needs: repo-shape
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Report robopoker fork divergence
        run: bash .github/scripts/check_robopoker_fork_status.sh

  python-research-qa:
    name: Python Research QA
    runs-on: ubuntu-latest
    needs: repo-shape

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python research QA dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest ruff

      - name: Ruff check
        run: ruff check main.py methods.py runner.py metrics.py data.py

      - name: Python test suite
        run: python -m pytest tests/test_metrics.py tests/test_data.py -v

  active-crates:
    name: Active Crates
    runs-on: ubuntu-latest
    needs: repo-shape
    env:
      SKIP_WASM_BUILD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cargo check (all active crates)
        run: |
          cargo check \
            -p myosu-games \
            -p myosu-games-kuhn \
            -p myosu-games-poker \
            -p myosu-games-liars-dice \
            -p myosu-tui \
            -p myosu-play \
            -p myosu-chain-client \
            -p myosu-miner \
            -p myosu-validator

      - name: Focused property, shell-state, and smoke proofs
        run: |
          cargo test -p myosu-games --quiet serialization_roundtrip
          cargo test -p myosu-games-kuhn --quiet
          cargo test -p myosu-tui shell_state
          cargo test -p myosu-play smoke_report_proves_preflop_to_flop_progression --quiet
          cargo run -p myosu-play --quiet -- --smoke-test
          cargo run -p myosu-play --quiet -- --game kuhn --smoke-test

      - name: INV-004 solver-gameplay dependency boundary
        run: |
          play_tree="$(cargo tree -p myosu-play --edges normal)"
          if grep -q 'myosu-miner' <<<"$play_tree"; then
            echo "INV-004 violated: myosu-play depends on myosu-miner"
            printf '%s\n' "$play_tree"
            exit 1
          fi
          miner_tree="$(cargo tree -p myosu-miner --edges normal)"
          if grep -q 'myosu-play' <<<"$miner_tree"; then
            echo "INV-004 violated: myosu-miner depends on myosu-play"
            printf '%s\n' "$miner_tree"
            exit 1
          fi

      - name: Full active-crate test suite
        run: |
          cargo test --quiet \
            -p myosu-games \
            -p myosu-games-kuhn \
            -p myosu-games-poker \
            -p myosu-games-liars-dice \
            -p myosu-tui \
            -p myosu-play \
            -p myosu-chain-client \
            -p myosu-miner \
            -p myosu-validator

      - name: Clippy (all active crates)
        run: |
          cargo clippy \
            -p myosu-games \
            -p myosu-games-kuhn \
            -p myosu-games-poker \
            -p myosu-games-liars-dice \
            -p myosu-tui \
            -p myosu-play \
            -p myosu-chain-client \
            -p myosu-miner \
            -p myosu-validator \
            -- -D warnings

      - name: Rustfmt (all active crates)
        run: |
          git ls-files \
            'crates/myosu-tui/**/*.rs' \
            'crates/myosu-games/**/*.rs' \
            'crates/myosu-games-kuhn/**/*.rs' \
            'crates/myosu-games-poker/**/*.rs' \
            'crates/myosu-games-liars-dice/**/*.rs' \
            'crates/myosu-play/**/*.rs' \
            'crates/myosu-chain-client/**/*.rs' \
            'crates/myosu-miner/**/*.rs' \
            'crates/myosu-validator/**/*.rs' \
            | xargs rustfmt --edition 2024 --check

  chain-core:
    name: Chain Core
    runs-on: ubuntu-latest
    needs: repo-shape
    env:
      SKIP_WASM_BUILD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: chain-stage0

      - name: Runtime check
        run: cargo check -p myosu-chain-runtime --features fast-runtime

      - name: Pallet check
        run: cargo check -p pallet-game-solver

      - name: Node check
        run: cargo check -p myosu-chain --features fast-runtime

      - name: Pallet stage-0 tests
        run: cargo test -p pallet-game-solver --quiet -- stage_0

      - name: Runtime tests
        run: cargo test -p myosu-chain-runtime --quiet

      - name: Refresh runtime wasm cache for migration smoke test
        run: env -u SKIP_WASM_BUILD cargo build -p myosu-chain-runtime --features fast-runtime --quiet

      - name: Runtime migration smoke test
        run: cargo test -p myosu-chain --features fast-runtime,try-runtime --quiet devnet_runtime_upgrade_smoke_test_passes_on_fresh_genesis

  integration-e2e:
    name: E2E Integration
    runs-on: ubuntu-latest
    needs: chain-core
    timeout-minutes: 15
    env:
      SKIP_WASM_BUILD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32v1-none

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: chain-stage0

      - name: Local loop integration proof
        run: bash tests/e2e/local_loop.sh

      - name: Two-node sync proof
        run: bash tests/e2e/two_node_sync.sh

      - name: Four-authority finality proof
        run: bash tests/e2e/four_node_finality.sh

      - name: Cross-node emission agreement proof
        run: bash tests/e2e/cross_node_emission.sh

      - name: Cross-validator determinism proof
        run: bash tests/e2e/validator_determinism.sh

      - name: Emission accounting proof
        run: bash tests/e2e/emission_flow.sh

  doctrine:
    name: Doctrine Integrity
    runs-on: ubuntu-latest
    needs: repo-shape

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Verify canonical spec integrity
        run: bash .github/scripts/check_doctrine_integrity.sh

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: repo-shape

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@2e5e45e985ec9321fdd2b05aa8de0872b125c29f # cargo-audit

      - name: Cargo audit
        run: |
          # The current allowlist mirrors WORKLIST.md `SEC-001`: inherited
          # Substrate/opentensor advisories plus the still-deferred direct
          # `bincode 1.x` usage in the game crates. This keeps CI aligned with
          # the documented defer decision until the dependency-remediation task
          # is pulled into the active queue. Any advisory outside this list
          # must still fail the gate.
          cargo audit \
            -D warnings \
            --ignore RUSTSEC-2025-0009 \
            --ignore RUSTSEC-2025-0055 \
            --ignore RUSTSEC-2023-0091 \
            --ignore RUSTSEC-2024-0438 \
            --ignore RUSTSEC-2025-0118 \
            --ignore RUSTSEC-2026-0020 \
            --ignore RUSTSEC-2026-0021 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2020-0168 \
            --ignore RUSTSEC-2022-0061 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0010 \
            --ignore RUSTSEC-2021-0127 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2024-0442

  plan-quality:
    name: Plan Quality
    runs-on: ubuntu-latest
    needs: repo-shape

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Verify genesis plans expose milestones and proof commands
        run: bash .github/scripts/check_plan_quality.sh

  operator-network:
    name: Operator Network
    runs-on: ubuntu-latest
    needs: repo-shape
    env:
      SKIP_WASM_BUILD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Verify operator bundle and named-network packaging
        run: bash .github/scripts/check_operator_network_bootstrap.sh

  chain-clippy:
    name: Chain Clippy
    runs-on: ubuntu-latest
    needs: repo-shape
    env:
      SKIP_WASM_BUILD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Runtime clippy
        run: cargo clippy -p myosu-chain-runtime --features fast-runtime -- -D warnings

      - name: Pallet clippy
        run: cargo clippy -p pallet-game-solver -- -D warnings

      - name: Node clippy
        run: cargo clippy -p myosu-chain --features fast-runtime -- -D warnings
